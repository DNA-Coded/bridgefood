services:
  - type: web
    name: foodbridge-api
    env: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
        description: "Your MongoDB Atlas connection URI string"
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Gemini/Gemma API authentication key"
      - key: USE_MOCK_ANALYSIS
        value: "false"
      - key: CORS_ORIGINS
        value: '["*"]'
